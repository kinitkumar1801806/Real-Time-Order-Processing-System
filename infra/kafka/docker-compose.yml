version: "3.9"
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "kinit@2603"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "sqlcmd", "-S", "localhost", "-U", "sa", "-P", "kinit@2603", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - sqlserver
    volumes:
      - ./data/sqlserver:/scripts
    entrypoint: /bin/bash -c "sleep 20 && /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P kinit@2603 -d master -i /scripts/init.sql"

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - ./data/cassandra:/docker-entrypoint-initdb.d

  zookeeper:
    image: wurstmeister/zookeeper:3.4.6
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:2.12-2.2.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

  orderservice:
    build: ../backend/OrderService
    ports:
      - "5000:80"
    depends_on:
      - sqlserver
      - kafka

  consumerservice:
    build: ../backend/ConsumerService
    depends_on:
      - kafka
      - cassandra
      - sqlserver

  frontend:
    build: ../frontend/order-portal
    ports:
      - "4200:80"
    depends_on:
      - orderservice
